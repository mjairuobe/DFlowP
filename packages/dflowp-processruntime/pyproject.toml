[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dflowp-processruntime"
version = "0.1.0"
description = "DFlowP process runtime and plugins"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "dflowp-core>=0.1.0",
    "fastapi>=0.109.0",
    "feedparser>=6.0.11",
    "httpx>=0.26.0",
    "openai>=1.12.0",
    "typing-extensions>=4.8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["dflowp_processruntime*"]
