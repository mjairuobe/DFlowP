# Gateway UI Bakery — eigene Hauptkonfiguration unter /etc/nginx/dflowp-gateway.conf
# (Compose startet nginx mit -c …; siehe bakery-gateway entrypoint), damit entry.sh die Datei nicht überschreibt.
worker_processes auto;

events {
    worker_connections 10000;
}

http {
    gzip on;
    gzip_vary on;
    gzip_min_length 102400;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json application/javascript;

    limit_req_status 429;
    limit_conn_status 429;
    error_page 429 /429.html;

    proxy_http_version 1.1;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    include /etc/nginx/dflowp-mime.types;
    default_type application/octet-stream;

    # Upstream Content-Type ausblenden; MIME aus Dateiendung (mime.types)
    proxy_hide_header Content-Type;

    server {
        listen 3030;
        listen [::]:3030;
        server_name _;
        server_tokens off;
        client_max_body_size 50M;
        client_header_buffer_size 64k;
        large_client_header_buffers 4 64k;

        location = /429.html {
            root /usr/share/nginx/html;
            internal;
        }

        location ~ ^/api/actuator/health {
            rewrite /api/(.+) /$1 break;
            proxy_pass http://bakery-back:8080;
        }

        location ~ ^/api/actuator/(.+) {
            return 403 'not-allowed';
        }

        location ~ ^/api/(datasource|httpsource)/.+/build-payload {
            return 403 'not-allowed';
        }

        location ~ ^/api/auth/(register|login|forgot-password|setup-mfa|mfa|verify-mfa|refresh-token) {
            rewrite /api/(.+) /$1 break;
            proxy_pass http://bakery-back:8080;
        }

        location = /api/user {
            rewrite /api/(.+) /$1 break;
            proxy_pass http://bakery-back:8080;
        }

        location ~ ^/api/(datasource|httpsource)/.+/request {
            rewrite /api/(.+) /$1 break;
            proxy_pass http://bakery-back:8080;
        }

        location /api {
            rewrite /api/(.+) /$1 break;
            proxy_pass http://bakery-back:8080;
        }

        location /storages/ {
            proxy_pass http://bakery-back:8080;
        }

        location ~ ^/datasource/(datasource|httpsource)/.+/request {
            rewrite /datasource/(.+) /$1 break;
            proxy_pass http://datasource:6060;
        }

        location /workbench {
            rewrite /workbench/(.+) /$1 break;
            proxy_pass http://workbench-front:8080;
        }

        location = /robots.txt {
            root /usr/share/nginx/html/;
        }

        location = /sitemap.xml {
            add_header Content-Type application/xml;
            root /usr/share/nginx/html/;
        }

        location / {
            proxy_pass http://bakery-front:8080;
        }
    }
}
