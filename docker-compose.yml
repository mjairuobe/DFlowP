# Fester Projektname → kurze Container-Namen (z. B. dflowp-api-1 statt Ordnername-Präfix).
name: dflowp

services:
  mongo:
    image: mongo:7
    container_name: dflowp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
    volumes:
      - ./volumes/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --eval \"db.adminCommand({ ping: 1 }).ok\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:27017:27017"

  api:
    container_name: dflowp-api
    build:
      context: .
      target: api
    image: ${DOCKER_IMAGE_API:-dflowp-api:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # URI wird in Python per resolve_mongodb_uri() gebaut (Passwort URL-sicher).
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      MONGODB_TEST_DB: ${MONGODB_TEST_DB:-dflowp_test}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DFlowP_API_Key: ${DFlowP_API_Key:-}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
      PROCESS_CONFIG: ${PROCESS_CONFIG:-examples/processconfig_example.json}
      INPUT_DATA: ${INPUT_DATA:-examples/inputdata_set.json}
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "dflowp.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    container_name: dflowp-worker
    build:
      context: .
      target: runtime
    image: ${DOCKER_IMAGE_RUNTIME:-dflowp-runtime:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
      PROCESS_CONFIG: ${PROCESS_CONFIG:-examples/processconfig_example.json}
      INPUT_DATA: ${INPUT_DATA:-examples/inputdata_set.json}
      DFLOWP_POLL_INTERVAL: ${DFLOWP_POLL_INTERVAL:-5}
      DFLOWP_RUNTIME_ENABLE_LOCAL_EVENT_SUBS: "0"
      DFLOWP_RUNTIME_EVENT_PORT: ${DFLOWP_RUNTIME_EVENT_PORT:-8002}
      DFLOWP_RUNTIME_PUBLIC_URL: ${DFLOWP_RUNTIME_PUBLIC_URL:-http://worker:8002}
      DFLOWP_RUNTIME_SUBSCRIBER_ID: ${DFLOWP_RUNTIME_SUBSCRIBER_ID:-dflowp-runtime}
      DFLOWP_EVENTSYSTEM_URL: ${DFLOWP_EVENTSYSTEM_URL:-http://eventsystem:8001}
      DFLOWP_EVENTSYSTEM_SUBSCRIBE_RETRIES: ${DFLOWP_EVENTSYSTEM_SUBSCRIBE_RETRIES:-30}
      DFLOWP_EVENTSYSTEM_SUBSCRIBE_RETRY_SLEEP: ${DFLOWP_EVENTSYSTEM_SUBSCRIBE_RETRY_SLEEP:-1.0}
      DFLOWP_PLUGIN_ENDPOINTS: ${DFLOWP_PLUGIN_ENDPOINTS:-FetchFeedItems=http://plugin-fetchfeeditems:8101,EmbedData=http://plugin-embeddata:8102,Clustering_DBSCAN=http://plugin-clustering-dbscan:8103,Clustering_HDBSCAN=http://plugin-clustering-hdbscan:8104}
      DFLOWP_PLUGIN_REMOTE_RETRIES: ${DFLOWP_PLUGIN_REMOTE_RETRIES:-15}
      DFLOWP_PLUGIN_REMOTE_RETRY_DELAY_SECONDS: ${DFLOWP_PLUGIN_REMOTE_RETRY_DELAY_SECONDS:-25}
      DFLOWP_PLUGIN_REMOTE_HTTP_TIMEOUT: ${DFLOWP_PLUGIN_REMOTE_HTTP_TIMEOUT:-600}
    command: ["python", "-m", "dflowp.worker.runtime_event_listener"]

  eventsystem:
    container_name: dflowp-eventsystem
    build:
      context: .
      target: eventsystem
    image: ${DOCKER_IMAGE_EVENTSYSTEM:-dflowp-eventsystem:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
    command: ["uvicorn", "dflowp.eventsystem.app:app", "--host", "0.0.0.0", "--port", "8001"]

  event-broker:
    container_name: dflowp-event-broker
    build:
      context: .
      target: event-broker
    image: ${DOCKER_IMAGE_EVENT_BROKER:-dflowp-event-broker:local}
    depends_on:
      mongo:
        condition: service_healthy
      eventsystem:
        condition: service_started
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      DFLOWP_EVENTSYSTEM_URL: ${DFLOWP_EVENTSYSTEM_URL:-http://eventsystem:8001}
      DFLOWP_EVENT_BROKER_POLL_SECONDS: ${DFLOWP_EVENT_BROKER_POLL_SECONDS:-1.0}
      DFLOWP_EVENT_BROKER_BATCH_SIZE: ${DFLOWP_EVENT_BROKER_BATCH_SIZE:-100}
      DFLOWP_EVENT_BROKER_HTTP_TIMEOUT: ${DFLOWP_EVENT_BROKER_HTTP_TIMEOUT:-10.0}
    command: ["python", "-m", "dflowp.event_broker.app"]

  plugin-fetchfeeditems:
    container_name: dflowp-plugin-fetchfeeditems
    build:
      context: .
      target: plugin-fetchfeeditems
    image: ${DOCKER_IMAGE_PLUGIN_FETCHFEEDITEMS:-dflowp-plugin-fetchfeeditems:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
    command: ["uvicorn", "dflowp.plugin_fetchfeeditems.app:app", "--host", "0.0.0.0", "--port", "8101"]

  plugin-embeddata:
    container_name: dflowp-plugin-embeddata
    build:
      context: .
      target: plugin-embeddata
    image: ${DOCKER_IMAGE_PLUGIN_EMBEDDATA:-dflowp-plugin-embeddata:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
    command: ["uvicorn", "dflowp.plugin_embeddata.app:app", "--host", "0.0.0.0", "--port", "8102"]

  plugin-clustering-dbscan:
    container_name: dflowp-plugin-clustering-dbscan
    build:
      context: .
      target: plugin-clustering-dbscan
    image: ${DOCKER_IMAGE_PLUGIN_CLUSTERING_DBSCAN:-dflowp-plugin-clustering-dbscan:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
    command: ["uvicorn", "dflowp.plugin_clustering_dbscan.app:app", "--host", "0.0.0.0", "--port", "8103"]

  plugin-clustering-hdbscan:
    container_name: dflowp-plugin-clustering-hdbscan
    build:
      context: .
      target: plugin-clustering-hdbscan
    image: ${DOCKER_IMAGE_PLUGIN_CLUSTERING_HDBSCAN:-dflowp-plugin-clustering-hdbscan:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
    command: ["uvicorn", "dflowp.plugin_clustering_hdbscan.app:app", "--host", "0.0.0.0", "--port", "8104"]

  # --- UI Bakery On-Premise
  # Servicenamen wie im Upstream https://github.com/uibakery/self-hosted/blob/main/docker-compose.yml
  # (env: docker/generate_uibakery_env.sh → docker/uibakery.env)

  bakery-gateway:
    container_name: dflowp-bakery-gateway
    restart: unless-stopped
    depends_on:
      - bakery-front
      - workbench-front
      - bakery-back
    image: cruibakeryonprem.azurecr.io/cloud/gateway:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env
    # Bind-Mounts (schreibbar): Gateway entry.sh patcht nginx.conf zur Laufzeit —
    # Docker configs: wären read-only und verursachen "Read-only file system".
    volumes:
      - ./docker/uibakery-gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/uibakery-gateway/mime.types:/etc/nginx/mime.types
    ports:
      - "127.0.0.1:${UI_BAKERY_PORT:-8010}:3030"

  bakery-front:
    container_name: dflowp-bakery-front
    restart: unless-stopped
    image: cruibakeryonprem.azurecr.io/cloud/bakery-front:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  workbench-front:
    container_name: dflowp-workbench-front
    restart: unless-stopped
    image: cruibakeryonprem.azurecr.io/cloud/workbench-front:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  datasource:
    container_name: dflowp-datasource
    restart: unless-stopped
    image: cruibakeryonprem.azurecr.io/cloud/datasource:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  bakery-back:
    container_name: dflowp-bakery-back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    image: cruibakeryonprem.azurecr.io/cloud/bakery-back:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  automation:
    container_name: dflowp-automation
    restart: unless-stopped
    image: cruibakeryonprem.azurecr.io/cloud/automation:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  python-runtime:
    container_name: dflowp-python-runtime
    restart: unless-stopped
    image: cruibakeryonprem.azurecr.io/cloud/python-runtime:${UI_BAKERY_VERSION:-latest}
    env_file:
      - ./docker/uibakery.env

  db:
    platform: linux/amd64
    container_name: dflowp-db
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --skip-log-bin
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    environment:
      MYSQL_DATABASE: bakery
      MYSQL_USER: bakery
      MYSQL_PASSWORD: bakery
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -u bakery --password=bakery -e \"select 1\""]
      timeout: 5s
      interval: 10s
      retries: 10

  bakery-db:
    container_name: dflowp-bakery-db
    image: postgres:16.1
    restart: unless-stopped
    environment:
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery
      POSTGRES_DB: bakery
    volumes:
      - internal-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  my-db:
    name: dflowp_uibakery_mysql_data
  internal-db:
    name: dflowp_uibakery_postgres_internal

