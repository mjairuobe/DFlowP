services:
  mongo:
    image: mongo:7
    container_name: dflowp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
    volumes:
      - ./volumes/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --eval \"db.adminCommand({ ping: 1 }).ok\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:27017:27017"

  api:
    build:
      context: .
      target: api
    image: ${DOCKER_IMAGE_API:-dflowp-api:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # URI wird in Python per resolve_mongodb_uri() gebaut (Passwort URL-sicher).
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      MONGODB_TEST_DB: ${MONGODB_TEST_DB:-dflowp_test}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DFlowP_API_Key: ${DFlowP_API_Key:-}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
      PROCESS_CONFIG: ${PROCESS_CONFIG:-examples/processconfig_example.json}
      INPUT_DATA: ${INPUT_DATA:-examples/inputdata_set.json}
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "dflowp.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      target: runtime
    image: ${DOCKER_IMAGE_RUNTIME:-dflowp-runtime:local}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGODB_USERNAME: ${MONGODB_USERNAME:-dflowp}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-dflowp_password}
      MONGODB_AUTH_SOURCE: admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-dflowp}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SOFTWARE_VERSION: ${SOFTWARE_VERSION:-latest}
      PROCESS_CONFIG: ${PROCESS_CONFIG:-examples/processconfig_example.json}
      INPUT_DATA: ${INPUT_DATA:-examples/inputdata_set.json}
      DFLOWP_POLL_INTERVAL: ${DFLOWP_POLL_INTERVAL:-5}
    command: ["python", "-m", "dflowp_processruntime.engine.engine_worker"]

