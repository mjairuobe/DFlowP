# Umgebungsvariablen setzen mit: eval "$(python3 scripts/ci_compose_env.py)"
name: modular-demo

services:
  http-api:
    image: ${DOCKER_IMAGE_HTTP_API:-example-org/http-api:local}
    container_name: demo-http-api
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    image: ${DOCKER_IMAGE_WORKER:-example-org/worker:local}
    container_name: demo-worker
